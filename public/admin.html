<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telegram Proxy — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #030712;
    --surface: #0d1117;
    --surface2: #161b27;
    --border: #1e2a3a;
    --accent: #00ff87;
    --blue: #4da6ff;
    --red: #ff4d4d;
    --orange: #ff9500;
    --text: #e2e8f0;
    --muted: #4a5568;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    min-height: 100vh;
  }

  /* ===== LOGIN ===== */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at center, rgba(0,255,135,0.05) 0%, transparent 70%);
  }
  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem;
    width: 100%;
    max-width: 420px;
    text-align: center;
  }
  .login-box h1 {
    font-size: 1.8rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.5rem;
  }
  .login-box p { color: var(--muted); font-size: 0.85rem; margin-bottom: 2rem; }

  input, select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.8rem 1rem;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 0.9rem;
    margin-bottom: 1rem;
    outline: none;
    transition: border-color 0.2s;
    text-align: right;
  }
  input:focus, select:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }

  button {
    width: 100%;
    padding: 0.9rem;
    border: none;
    border-radius: 10px;
    font-family: 'Cairo', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #00cc6a);
    color: #000;
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-danger {
    background: rgba(255,77,77,0.1);
    border: 1px solid rgba(255,77,77,0.3);
    color: var(--red);
    width: auto;
    padding: 0.5rem 1rem;
    font-size: 0.85rem;
  }
  .btn-danger:hover { background: rgba(255,77,77,0.2); }
  .btn-secondary {
    background: rgba(77,166,255,0.1);
    border: 1px solid rgba(77,166,255,0.3);
    color: var(--blue);
    width: auto;
    padding: 0.5rem 1rem;
    font-size: 0.85rem;
  }
  .btn-secondary:hover { background: rgba(77,166,255,0.2); }

  .error-msg {
    color: var(--red);
    font-size: 0.82rem;
    margin-top: 0.5rem;
    display: none;
  }

  /* ===== DASHBOARD ===== */
  #dashboard { display: none; }

  .navbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .navbar-brand {
    font-weight: 900;
    font-size: 1.2rem;
    background: linear-gradient(135deg, var(--accent), var(--blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .navbar-status {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
  }
  .btn-logout {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    width: auto;
    padding: 0.4rem 1rem;
    font-size: 0.8rem;
    border-radius: 8px;
  }
  .btn-logout:hover { border-color: var(--red); color: var(--red); }

  .main {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem;
  }

  /* Add Bot Form */
  .add-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 2rem;
    position: relative;
  }
  .add-form::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
    border-radius: 16px 16px 0 0;
  }
  .form-title {
    font-weight: 700;
    font-size: 1rem;
    margin-bottom: 1.2rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.8rem;
    margin-bottom: 0.8rem;
  }
  .form-grid input { margin-bottom: 0; }
  .form-full { grid-column: 1 / -1; }

  /* Bots List */
  .section-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  .bot-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.2rem 1.5rem;
    margin-bottom: 0.8rem;
    transition: all 0.2s;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .bot-card:hover { border-color: rgba(0,255,135,0.2); }

  .bot-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.8rem;
  }
  .bot-name {
    font-weight: 700;
    font-size: 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .bot-id {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    background: rgba(0,255,135,0.1);
    color: var(--accent);
    padding: 2px 8px;
    border-radius: 4px;
  }
  .bot-actions { display: flex; gap: 0.5rem; }

  .bot-urls {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  .bot-url {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.5rem 0.8rem;
  }
  .url-label {
    color: var(--muted);
    white-space: nowrap;
    min-width: 80px;
  }
  .url-value {
    color: var(--accent);
    word-break: break-all;
    flex: 1;
  }
  .copy-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.75rem;
    width: auto;
    transition: color 0.2s;
  }
  .copy-btn:hover { color: var(--accent); }
  .copy-btn.copied { color: var(--accent); }

  .empty-state {
    text-align: center;
    padding: 3rem;
    color: var(--muted);
    font-size: 0.9rem;
  }

  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 0.8rem 1.5rem;
    border-radius: 10px;
    font-size: 0.85rem;
    font-family: 'IBM Plex Mono', monospace;
    transition: transform 0.3s;
    z-index: 999;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .loading { opacity: 0.6; pointer-events: none; }
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="login-screen">
  <div class="login-box">
    <h1>📡 Telegram Proxy</h1>
    <p>Admin Panel — ادخل الباسورد عشان تكمل</p>
    <input type="password" id="password-input" placeholder="الباسورد" />
    <button class="btn-primary" onclick="login()">دخول</button>
    <div class="error-msg" id="login-error">❌ باسورد غلط</div>
  </div>
</div>

<!-- ===== DASHBOARD ===== -->
<div id="dashboard">
  <nav class="navbar">
    <div class="navbar-brand">📡 Telegram Proxy</div>
    <div class="navbar-status">
      <div class="status-dot"></div>
      ONLINE
    </div>
    <button class="btn-logout" onclick="logout()">خروج</button>
  </nav>

  <div class="main">

    <!-- Add Bot Form -->
    <div class="add-form">
      <div class="form-title">➕ ضيف بوت جديد</div>
      <div class="form-grid">
        <input type="text" id="bot-id" placeholder="Bot ID (بدون مسافات مثلاً: mybot)" />
        <input type="text" id="bot-name" placeholder="اسم البوت (اختياري)" />
        <input type="text" id="bot-token" placeholder="Telegram Token من BotFather" class="form-full" />
        <input type="text" id="bot-webhook" placeholder="n8n Webhook URL" class="form-full" />
      </div>
      <button class="btn-primary" onclick="addBot()">حفظ وتفعيل الـ Webhook ✅</button>
    </div>

    <!-- Bots List -->
    <div class="section-title">// البوتات المضافة</div>
    <div id="bots-list">
      <div class="empty-state">جاري التحميل...</div>
    </div>

  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  let TOKEN = "";
  const HOST = window.location.origin;

  // ===== LOGIN =====
  async function login() {
    const password = document.getElementById("password-input").value;
    try {
      const res = await fetch("/api/auth", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password })
      });
      const data = await res.json();
      if (data.ok) {
        TOKEN = data.token;
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
        loadBots();
      } else {
        document.getElementById("login-error").style.display = "block";
      }
    } catch {
      document.getElementById("login-error").style.display = "block";
    }
  }

  document.getElementById("password-input").addEventListener("keydown", e => {
    if (e.key === "Enter") login();
  });

  function logout() {
    TOKEN = "";
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("dashboard").style.display = "none";
    document.getElementById("password-input").value = "";
  }

  // ===== LOAD BOTS =====
  async function loadBots() {
    try {
      const res = await fetch("/api/bots", {
        headers: { "x-admin-token": TOKEN }
      });
      const data = await res.json();
      renderBots(data.bots || []);
    } catch {
      renderBots([]);
    }
  }

  function renderBots(bots) {
    const container = document.getElementById("bots-list");
    if (!bots.length) {
      container.innerHTML = `<div class="empty-state">🤖 مفيش بوتات لسه — ضيف أول بوت!</div>`;
      return;
    }
    container.innerHTML = bots.map(bot => `
      <div class="bot-card" id="bot-${bot.id}">
        <div class="bot-header">
          <div class="bot-name">
            🤖 ${bot.name || bot.id}
            <span class="bot-id">${bot.id}</span>
          </div>
          <div class="bot-actions">
            <button class="btn-secondary" onclick="copyAll('${bot.id}')">نسخ الـ URLs</button>
            <button class="btn-danger" onclick="deleteBot('${bot.id}')">حذف</button>
          </div>
        </div>
        <div class="bot-urls">
          <div class="bot-url">
            <span class="url-label">Webhook</span>
            <span class="url-value" id="webhook-url-${bot.id}">${HOST}/api/webhook/${bot.id}</span>
            <button class="copy-btn" onclick="copyUrl('webhook-url-${bot.id}', this)">📋</button>
          </div>
          <div class="bot-url">
            <span class="url-label">Send MSG</span>
            <span class="url-value" id="send-url-${bot.id}">${HOST}/api/telegram/${bot.id}?method=sendMessage</span>
            <button class="copy-btn" onclick="copyUrl('send-url-${bot.id}', this)">📋</button>
          </div>
          <div class="bot-url">
            <span class="url-label">File DL</span>
            <span class="url-value" id="file-url-${bot.id}">${HOST}/api/file/${bot.id}?file_id=FILE_ID</span>
            <button class="copy-btn" onclick="copyUrl('file-url-${bot.id}', this)">📋</button>
          </div>
          <div class="bot-url">
            <span class="url-label">Upload</span>
            <span class="url-value" id="upload-url-${bot.id}">${HOST}/api/upload/${bot.id}?method=sendDocument&chat_id=CHAT_ID&filename=file.json&mimetype=application/json</span>
            <button class="copy-btn" onclick="copyUrl('upload-url-${bot.id}', this)">📋</button>
          </div>
        </div>
      </div>
    `).join("");
  }

  // ===== ADD BOT =====
  async function addBot() {
    const id       = document.getElementById("bot-id").value.trim();
    const name     = document.getElementById("bot-name").value.trim();
    const token    = document.getElementById("bot-token").value.trim();
    const webhookUrl = document.getElementById("bot-webhook").value.trim();

    if (!id || !token || !webhookUrl) {
      showToast("❌ ملي كل الحقول المطلوبة");
      return;
    }

    try {
      const res = await fetch("/api/bots", {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-admin-token": TOKEN },
        body: JSON.stringify({ id, name, token, webhookUrl })
      });
      const data = await res.json();
      if (data.ok) {
        showToast("✅ البوت اتضاف والـ Webhook اتفعّل!");
        document.getElementById("bot-id").value = "";
        document.getElementById("bot-name").value = "";
        document.getElementById("bot-token").value = "";
        document.getElementById("bot-webhook").value = "";
        loadBots();
      } else {
        showToast("❌ " + (data.error || "حصل خطأ"));
      }
    } catch (err) {
      showToast("❌ " + err.message);
    }
  }

  // ===== DELETE BOT =====
  async function deleteBot(id) {
    if (!confirm(`هتحذف البوت "${id}"؟`)) return;
    try {
      const res = await fetch(`/api/bots?id=${id}`, {
        method: "DELETE",
        headers: { "x-admin-token": TOKEN }
      });
      const data = await res.json();
      if (data.ok) {
        showToast("🗑️ البوت اتحذف");
        loadBots();
      }
    } catch (err) {
      showToast("❌ " + err.message);
    }
  }

  // ===== COPY =====
  function copyUrl(elementId, btn) {
    const text = document.getElementById(elementId).textContent;
    navigator.clipboard.writeText(text);
    btn.textContent = "✅";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "📋"; btn.classList.remove("copied"); }, 2000);
  }

  function copyAll(botId) {
    const urls = [
      `Webhook: ${HOST}/api/webhook/${botId}`,
      `Send:    ${HOST}/api/telegram/${botId}?method=sendMessage`,
      `File:    ${HOST}/api/file/${botId}?file_id=FILE_ID`,
      `Upload:  ${HOST}/api/upload/${botId}?method=sendDocument&chat_id=CHAT_ID`,
    ].join("\n");
    navigator.clipboard.writeText(urls);
    showToast("📋 كل الـ URLs اتنسخوا!");
  }

  // ===== TOAST =====
  function showToast(msg) {
    const toast = document.getElementById("toast");
    toast.textContent = msg;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 3000);
  }
</script>
</body>
</html>
